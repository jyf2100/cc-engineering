name: Issue Auto Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze Issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        id: analyze
        run: |
          # 分析 Issue 并生成修复计划
          claude -p "
          A GitHub Issue needs to be fixed:

          Title: $ISSUE_TITLE
          Description: $ISSUE_BODY

          Please:
          1. Understand the problem
          2. Locate the relevant code
          3. Propose a fix plan
          4. Only modify safe files (src/, tests/)

          Do NOT make any changes yet, just analyze and report your plan.
          " \
            --allowedTools "Read,Grep,Glob" \
            --output-format json \
            --max-turns 10 \
            > analysis.json

          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          cat analysis.json | jq -r '.result' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Fix Branch
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@anthropic.com"
          git checkout -b fix/issue-${{ github.event.issue.number }}

      - name: Apply Fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          claude -p "
          Fix this GitHub Issue:

          Title: $ISSUE_TITLE
          Description: $ISSUE_BODY

          Apply the necessary code changes to fix this issue.
          Only modify files in src/ and tests/ directories.
          Ensure the fix is minimal and focused.
          " \
            --allowedTools "Read,Edit,Write,Grep,Glob" \
            --disallowedTools "Bash" \
            --max-turns 15

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "Fix: ${{ github.event.issue.title }}

          Closes #${{ github.event.issue.number }}

          This fix was automatically generated by Claude Code."

          git push origin fix/issue-${{ github.event.issue.number }}

          gh pr create \
            --title "Fix: ${{ github.event.issue.title }}" \
            --body "
          ## Summary
          This PR fixes issue #${{ github.event.issue.number }}

          ## Analysis
          ${{ steps.analyze.outputs.analysis }}

          ## Changes
          The following files were modified:
          \`\`\`
          $(git diff --name-only origin/main)
          \`\`\`

          ---
          *This PR was automatically generated by Claude Code*
          " \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on Issue
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ github.event.issue.number }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Auto-fix PR Created

              I've analyzed this issue and created a fix PR.

              Please review the changes before merging.

              ---
              *Automatically generated by Claude Code*`
            });

      - name: Comment on Issue (No Changes)
        if: steps.check-changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Analysis Complete

              I analyzed this issue but determined that no code changes are needed, or the fix requires manual intervention.

              ### Analysis
              ${{ steps.analyze.outputs.analysis }}

              ---
              *Automatically generated by Claude Code*`
            });
